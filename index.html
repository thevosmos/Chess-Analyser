<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Arena — Grandmaster AI & Engine Analytics</title>
    <script>
      // Polyfill localStorage & sessionStorage if they are blocked by sandbox iframe constraints
      (function() {
        var isStorageSupported = false;
        try {
          var testKey = '__storage_test__';
          window.localStorage.setItem(testKey, testKey);
          window.localStorage.removeItem(testKey);
          isStorageSupported = true;
        } catch (e) {
          isStorageSupported = false;
        }

        if (!isStorageSupported) {
          try {
            var makeMockStorage = function() {
              var store = {};
              return {
                getItem: function(key) {
                  return store.hasOwnProperty(key) ? store[key] : null;
                },
                setItem: function(key, value) {
                  store[key] = String(value);
                },
                removeItem: function(key) {
                  delete store[key];
                },
                clear: function() {
                  store = {};
                },
                key: function(index) {
                  var keys = Object.keys(store);
                  return keys[index] || null;
                },
                get length() {
                  return Object.keys(store).length;
                }
              };
            };

            var mockLocal = makeMockStorage();
            var mockSession = makeMockStorage();
            
            Object.defineProperty(window, 'localStorage', {
              get: function() { return mockLocal; },
              configurable: true,
              enumerable: true
            });
            Object.defineProperty(window, 'sessionStorage', {
              get: function() { return mockSession; },
              configurable: true,
              enumerable: true
            });
          } catch (e) {}
        }
      })();

      // Global error suppression for sandbox environment cross-origin scripts & web worker nuances
      window.addEventListener('error', function(e) {
        if (!e) return;
        var msg = String(e.message || (e.error && e.error.message) || '').toLowerCase();
        var file = String(e.filename || '').toLowerCase();
        if (
          !msg || 
          msg.indexOf('script error') > -1 || 
          msg.indexOf('stockfish') > -1 || 
          file.indexOf('stockfish') > -1 || 
          msg === 'error' || 
          msg === '[object event]'
        ) {
          try {
            e.preventDefault();
            e.stopPropagation();
          } catch(err) {}
          return true;
        }
      }, true);

      window.onerror = function(message, source, lineno, colno, error) {
        var msg = '';
        if (typeof message === 'string') {
          msg = message;
        } else if (message && message.message) {
          msg = message.message;
        } else if (message && message.type) {
          msg = message.type;
        } else {
          msg = String(message || '');
        }
        msg = msg.toLowerCase();
        
        var src = String(source || '').toLowerCase();
        
        if (
          !msg || 
          msg.indexOf('script error') > -1 || 
          msg.indexOf('stockfish') > -1 || 
          src.indexOf('stockfish') > -1 ||
          msg.indexOf('error') > -1 ||
          msg === 'error' ||
          msg === '[object event]'
        ) {
          return true;
        }
        return false;
      };

      window.addEventListener('unhandledrejection', function(e) {
        if (!e || !e.reason) return;
        var reasonStr = String(e.reason.message || e.reason || '');
        var lowerReason = reasonStr.toLowerCase();
        if (
          !lowerReason || 
          lowerReason.indexOf('script error') > -1 || 
          lowerReason.indexOf('stockfish') > -1 || 
          lowerReason.indexOf('auth/operation-not-allowed') > -1 ||
          lowerReason === 'error' ||
          lowerReason === '[object event]'
        ) {
          try {
            e.preventDefault();
            e.stopPropagation();
          } catch(err) {}
          return true;
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
